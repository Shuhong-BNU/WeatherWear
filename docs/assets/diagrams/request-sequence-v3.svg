eb" stroke-width="4" /><polygon points="2160,1088 2147.386435849366,1094.0743723476457 2147.386435849366,1081.9256276523543" fill="#2563eb" /><text x="1150" y="1080" font-size="16" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif">build_result_view_model</text><polyline points="2160,1130 800,1130" fill="none" stroke="#2563eb" stroke-width="4" stroke-dasharray="10 6" /><polygon points="800,1130 812.6135641506339,1123.9256276523543 812.6135641506339,1136.0743723476457" fill="#2563eb" /><text x="810" y="1122" font-size="16" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif">返回 QueryResponse(view_model)</text><polyline points="460,1168 460,1168" fill="none" stroke="#475569" stroke-width="4" /><polygon points="460,1168 447.38643584936614,1174.0743723476457 447.38643584936614,1161.9256276523543" fill="#475569" /><text x="470" y="1160" font-size="16" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif">更新结果 / 历史 / 收藏 / notice</text><polyline points="800,1224 800,1224" fill="none" stroke="#16a34a" stroke-width="4" /><polygon points="800,1224 787.3864358493661,1230.0743723476457 787.3864358493661,1217.9256276523543" fill="#16a34a" /><text x="810" y="1216" font-size="16" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif">写 trace / logs / app.events.jsonl</text><polyline points="460,1264 460,1264" fill="none" stroke="#f97316" stroke-width="4" /><polygon points="460,1264 447.38643584936614,1270.0743723476457 447.38643584936614,1257.9256276523543" fill="#f97316" /><text x="470" y="1256" font-size="16" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif">写 sessionStorage / localStorage</text>
